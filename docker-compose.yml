# =============================================================================
# Jujube Platform — Development Docker Compose
# =============================================================================

version: "3.9"

services:
  # ---------------------------------------------------------------------------
  # API Gateway
  # ---------------------------------------------------------------------------
  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    container_name: jujube-api-gateway
    env_file:
      - .env
    ports:
      - "${API_GATEWAY_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
      image-recognition:
        condition: service_started
      knowledge-graph:
        condition: service_started
      reasoning-engine:
        condition: service_started
      model-management:
        condition: service_started
      log-statistics:
        condition: service_started
    volumes:
      - ./services/api-gateway:/app/services/api-gateway:ro
    networks:
      - jujube-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Image Recognition Service
  # ---------------------------------------------------------------------------
  image-recognition:
    build:
      context: .
      dockerfile: services/image-recognition/Dockerfile
    container_name: jujube-image-recognition
    env_file:
      - .env
    ports:
      - "${IR_SERVICE_PORT:-9001}:9001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - model_artifacts:/app/models_registry:ro
      - dataset_volume:/app/datasets:ro
      - ./services/image-recognition:/app/services/image-recognition:ro
    networks:
      - jujube-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # ---------------------------------------------------------------------------
  # Knowledge Graph Service
  # ---------------------------------------------------------------------------
  knowledge-graph:
    build:
      context: .
      dockerfile: services/knowledge-graph/Dockerfile
    container_name: jujube-knowledge-graph
    env_file:
      - .env
    ports:
      - "${KG_SERVICE_PORT:-9002}:9002"
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/knowledge-graph:/app/services/knowledge-graph:ro
    networks:
      - jujube-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9002/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Reasoning Engine Service
  # ---------------------------------------------------------------------------
  reasoning-engine:
    build:
      context: .
      dockerfile: services/reasoning-engine/Dockerfile
    container_name: jujube-reasoning-engine
    env_file:
      - .env
    ports:
      - "${REASONING_SERVICE_PORT:-9003}:9003"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - model_artifacts:/app/models_registry:ro
      - ./services/reasoning-engine:/app/services/reasoning-engine:ro
    networks:
      - jujube-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9003/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Model Management Service
  # ---------------------------------------------------------------------------
  model-management:
    build:
      context: .
      dockerfile: services/model-management/Dockerfile
    container_name: jujube-model-management
    env_file:
      - .env
    ports:
      - "${MODEL_SERVICE_PORT:-9004}:9004"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - model_artifacts:/app/models_registry
      - dataset_volume:/app/datasets:ro
      - ./services/model-management:/app/services/model-management:ro
    networks:
      - jujube-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9004/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Log Statistics Service
  # ---------------------------------------------------------------------------
  log-statistics:
    build:
      context: .
      dockerfile: services/log-statistics/Dockerfile
    container_name: jujube-log-statistics
    env_file:
      - .env
    ports:
      - "${LOG_SERVICE_PORT:-9005}:9005"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/log-statistics:/app/services/log-statistics:ro
    networks:
      - jujube-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9005/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # PostgreSQL 14
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:14-alpine
    container_name: jujube-postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME:-jujube_platform}
      POSTGRES_USER: ${DB_USER:-jujube}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    ports:
      - "${DB_EXTERNAL_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./deploy/scripts/init_postgres.sh:/docker-entrypoint-initdb.d/init.sh:ro
    networks:
      - jujube-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-jujube} -d ${DB_NAME:-jujube_platform}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Neo4j 5 Enterprise
  # ---------------------------------------------------------------------------
  neo4j:
    image: neo4j:5-enterprise
    container_name: jujube-neo4j
    env_file:
      - .env
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-changeme}
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
      NEO4J_server_memory_heap_initial__size: "512m"
      NEO4J_server_memory_heap_max__size: "1g"
      NEO4J_server_memory_pagecache_size: "512m"
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./deploy/scripts/init_neo4j.sh:/init-neo4j.sh:ro
    networks:
      - jujube-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 40s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Redis 7
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: jujube-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_EXTERNAL_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - jujube-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Nginx Reverse Proxy (production-like local)
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.25-alpine
    container_name: jujube-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/docker/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api-gateway
    networks:
      - jujube-network
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    profiles:
      - proxy

# =============================================================================
# Volumes
# =============================================================================
volumes:
  pg_data:
    name: jujube_pg_data
    driver: local
  neo4j_data:
    name: jujube_neo4j_data
    driver: local
  neo4j_logs:
    name: jujube_neo4j_logs
    driver: local
  model_artifacts:
    name: jujube_model_artifacts
    driver: local
  dataset_volume:
    name: jujube_dataset_volume
    driver: local
  redis_data:
    name: jujube_redis_data
    driver: local

# =============================================================================
# Networks
# =============================================================================
networks:
  jujube-network:
    name: jujube-network
    driver: bridge
