---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: jujube
  labels:
    app: api-gateway
    app.kubernetes.io/name: jujube-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: jujube/api-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: jujube-config
            - secretRef:
                name: jujube-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
