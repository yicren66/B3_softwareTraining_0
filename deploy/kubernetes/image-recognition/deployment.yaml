---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: image-recognition
  namespace: jujube
  labels:
    app: image-recognition
    app.kubernetes.io/name: jujube-platform
    app.kubernetes.io/component: inference
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: image-recognition
  template:
    metadata:
      labels:
        app: image-recognition
        app.kubernetes.io/name: jujube-platform
        app.kubernetes.io/component: inference
    spec:
      # Node affinity for GPU nodes
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: nvidia.com/gpu.present
                    operator: In
                    values:
                      - "true"
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      containers:
        - name: image-recognition
          image: jujube/image-recognition:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: grpc
              containerPort: 9001
              protocol: TCP
            - name: http
              containerPort: 8001
              protocol: TCP
          envFrom:
            - configMapRef:
                name: jujube-config
            - secretRef:
                name: jujube-secrets
          env:
            # GPU resource limit derived from container limits
            - name: NVIDIA_VISIBLE_DEVICES
              value: "all"
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: "compute,utility"
          resources:
            requests:
              memory: "4Gi"
              cpu: "2"
              nvidia.com/gpu: "1"
            limits:
              memory: "8Gi"
              cpu: "4"
              nvidia.com/gpu: "1"
          volumeMounts:
            - name: model-registry
              mountPath: /app/models_registry
              readOnly: true
          livenessProbe:
            httpGet:
              path: /live
              port: 8001
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /ready
              port: 8001
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
      volumes:
        - name: model-registry
          persistentVolumeClaim:
            claimName: model-registry-pvc
