---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: jujube-ingress
  namespace: jujube
  labels:
    app.kubernetes.io/name: jujube-platform
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "20m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/use-regex: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.jujube.example.com
      secretName: jujube-tls
  rules:
    - host: api.jujube.example.com
      http:
        paths:
          - path: /api/v1/recognition
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8000
          - path: /api/v1/knowledge
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8000
          - path: /api/v1/reasoning
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8000
          - path: /api/v1/models
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8000
          - path: /api/v1/stats
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8000
          - path: /health
            pathType: Exact
            backend:
              service:
                name: api-gateway
                port:
                  number: 8000
          - path: /metrics
            pathType: Exact
            backend:
              service:
                name: image-recognition
                port:
                  number: 8001
