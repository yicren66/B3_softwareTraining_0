worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 2048;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format json_combined escape=json '{'
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"request":"$request",'
        '"status":$status,'
        '"body_bytes_sent":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_addr":"$upstream_addr",'
        '"upstream_response_time":"$upstream_response_time"'
    '}';

    access_log /var/log/nginx/access.log json_combined;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20m;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # ---- Upstream definitions ----
    upstream api_gateway {
        server api-gateway:8000 max_fails=3 fail_timeout=30s;
    }

    upstream image_recognition_http {
        server image-recognition:8001 max_fails=3 fail_timeout=30s;
    }

    # ---- HTTP redirect → HTTPS ----
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ---- HTTPS API server ----
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name api.jujube.local;

        ssl_certificate     /etc/nginx/ssl/jujube.crt;
        ssl_certificate_key /etc/nginx/ssl/jujube.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # API Gateway — REST endpoints
        location /api/ {
            proxy_pass http://api_gateway;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
        }

        # Health check
        location /health {
            proxy_pass http://api_gateway/health;
            proxy_set_header Host $host;
        }

        # Prometheus metrics from Image Recognition Service
        location /metrics/ir {
            proxy_pass http://image_recognition_http/metrics;
            proxy_set_header Host $host;
        }
    }
}
